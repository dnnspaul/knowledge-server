name: Release Please

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Only run if CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      # Upload non-binary assets (platform-independent) when a release is created
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - name: Upload non-binary release assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            plugin/knowledge.ts \
            commands/consolidate.md \
            commands/knowledge-review.md \
            scripts/install.sh

  build-binaries:
    name: Build binaries (${{ matrix.os }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
          - os: macos-latest
            suffix: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          bun build --compile --minify src/index.ts --outfile dist/knowledge-server-${{ matrix.suffix }}
          bun build --compile --minify src/daemon.ts --outfile dist/knowledge-daemon-${{ matrix.suffix }}

      - name: Generate checksums and compress
        run: |
          cd dist
          # Checksum the uncompressed binaries — update.ts verifies after gunzip
          if command -v sha256sum &>/dev/null; then
            sha256sum knowledge-server-${{ matrix.suffix }} > SHA256SUMS-${{ matrix.suffix }}
            sha256sum knowledge-daemon-${{ matrix.suffix }} >> SHA256SUMS-${{ matrix.suffix }}
          else
            shasum -a 256 knowledge-server-${{ matrix.suffix }} > SHA256SUMS-${{ matrix.suffix }}
            shasum -a 256 knowledge-daemon-${{ matrix.suffix }} >> SHA256SUMS-${{ matrix.suffix }}
          fi
          # Compress for distribution
          gzip -k knowledge-server-${{ matrix.suffix }}
          gzip -k knowledge-daemon-${{ matrix.suffix }}

      - name: Upload binaries and checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/knowledge-server-${{ matrix.suffix }} \
            dist/knowledge-server-${{ matrix.suffix }}.gz \
            dist/knowledge-daemon-${{ matrix.suffix }} \
            dist/knowledge-daemon-${{ matrix.suffix }}.gz \
            dist/SHA256SUMS-${{ matrix.suffix }}
